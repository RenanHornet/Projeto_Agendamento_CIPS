<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
   <header>
        
        <div class="divHeader">
            <div class="imagemLogo">
                <img src="../images/logo_cips.png" class="imagemLogo" alt="Logo CIPS">
            </div>
            <h1>Agendamento de salas </h1>
        </div>
    </header>
    <main>
        <div class="container">
            <h2>Cadastre-se</h2>
               <form action="../php/cadastrar.php" method="POST">
                <label for="nome" class="formFont">Nome:</label>
                <input type="text" id="nome" name="nome" class="formInput"><br><br>

                <label for="email" class="formFont">Email:</label>
                <input type="email" id="email" name="email" class="formInput"> <br><br>
        
                <label for="senha" class="formFont">Senha:</label>
                <input type="password" id="senha" name="senha" class="formInput" required> <br><br>
        
                <button type="submit" class="button">Cadastrar</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="divFooter">
            <p>Desenvolvido por Renan</p>
        </div>
    </footer>
</body>
</html>
